name: PR — lint + tests + terraform plan

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: |
          pip install ruff
          ruff check app worker tests || true   # advisory; don't block PRs on lint nits yet

      - name: Run tests with coverage
        working-directory: backend
        env:
          AWS_DEFAULT_REGION: us-east-1
          REDIS_URL: redis://localhost:6379/0
        run: pytest --cov=app --cov=worker --cov-report=term

  frontend:
    name: Frontend lint + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint || true   # advisory; don't block PRs on lint nits

      - name: Unit tests
        working-directory: frontend
        run: npm test

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

  terraform:
    name: Terraform format + validate + plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.6"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: terraform fmt
        working-directory: infra/terraform
        run: terraform fmt -recursive -check

      - name: terraform init
        working-directory: infra/terraform/environments/prod
        run: terraform init -input=false

      - name: terraform validate
        working-directory: infra/terraform/environments/prod
        run: terraform validate

      - name: terraform plan (read-only)
        working-directory: infra/terraform/environments/prod
        env:
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_image_tag: latest
        run: terraform plan -input=false -no-color
