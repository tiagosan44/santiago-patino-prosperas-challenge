services:
  localstack:
    image: localstack/localstack:3.5
    ports: ["4566:4566"]
    environment:
      SERVICES: sqs,sns,dynamodb,s3,iam,sts
      DEBUG: 0
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - "./localstack-data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  init-aws:
    image: amazon/aws-cli:latest
    depends_on: [localstack]
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep 5 && /init/init.sh"]
    volumes:
      - "./init:/init"

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: prosperas-api:dev
    ports: ["8000:8000"]
    environment:
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DYNAMODB_USERS_TABLE: users
      DYNAMODB_JOBS_TABLE: jobs
      SQS_HIGH_QUEUE_URL: http://localstack:4566/000000000000/jobs-high
      SQS_STANDARD_QUEUE_URL: http://localstack:4566/000000000000/jobs-standard
      SQS_DLQ_URL: http://localstack:4566/000000000000/jobs-dlq
      S3_REPORTS_BUCKET: prosperas-reports-local
      SNS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:job-updates
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: local-dev-secret-CHANGE-IN-PROD
      JWT_EXPIRY_MINUTES: 60
      LOG_LEVEL: INFO
      GIT_SHA: dev
    depends_on:
      - localstack
      - redis
      - init-aws
    volumes:
      # Hot-reload source code without rebuilding image
      - "../backend/app:/app/app"
      - "../backend/worker:/app/worker"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
